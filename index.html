<!DOCTYPE html>
<html>
<head>
    <title>Custom Link Button</title>
</head>
<body>

<input type="text" id="myLink"
       value="https://heydraquintana-prog.github.io/mulindwaabdul/"
       style="width:400px; padding:10px;">

<button onclick="goToLink()">Open Website</button>

<script>
function goToLink() {
    let link = document.getElementById("myLink").value;
    window.location.href = link;
}
</script>

</body>
</html>
